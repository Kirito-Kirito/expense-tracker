{% extends 'master.html' %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="card shadow border-0 text-center p-5" style="width: 100%; max-width: 500px; border-radius: 12px;">
        <div class="card-body">
            <div class="mb-4 text-success">
                <i class="fa-solid fa-circle-check fa-4x animate__animated animate__pulse animate__infinite"></i>
            </div>
            <h3 class="fw-bold text-dark mb-2">Password Reset Complete!</h3>
            <p class="text-muted small mb-4">
                Your password has been successfully reset. You can now sign in with your new account.
            </p>
            <a href="{% url 'login' %}" class="btn btn-success w-100 fw-semibold shadow-sm" style="border-radius: 8px;">
                <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In Now
            </a>
        </div>
    </div>
</div>
{% endblock %}

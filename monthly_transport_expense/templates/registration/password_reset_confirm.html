{% extends 'master.html' %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="card shadow border-0" style="width: 100%; max-width: 450px; border-radius: 12px;">
        <div class="card-body p-4">
            <h3 class="fw-bold text-primary mb-2">Password Reset Confirm</h3>
            <p class="text-muted small mb-4">Please enter your new password twice for verification.</p>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-secondary">Email Address</label>
                    {{ form.email }}
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-semibold" style="border-radius: 8px;">Send Reset Link</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'master.html' %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="card shadow border-0" style="width: 100%; max-width: 450px; border-radius: 12px;">
        <div class="card-body p-4">
            <h3 class="fw-bold text-primary mb-3">Change Password</h3>
            <form method="POST">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-secondary">{{ field.label }}</label>
                        {{ field }}
                        {% if field.help_text %}
                            <div class="form-text small">{{ field.help_text }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary w-100 fw-semibold mt-2" style="border-radius: 8px;">Change Password</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Transport Expense Tracker{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'expense_list' %}">
                <i class="fa-solid fa-bus-simple me-2"></i>Transport Tracker
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="ms-auto d-flex align-items-center">
                    
                    {% if user.is_authenticated %}
                        <div class="dropdown">
        <button class="btn btn-light bg-opacity-25 text-white dropdown-toggle rounded-pill px-3 py-1 small me-2" 
                type="button" id="userMenu" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="fa-solid fa-user me-1"></i> <strong>{{ user.username }}</strong>
        </button>
        
        <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2" aria-labelledby="userMenu">
            <li>
                <a class="dropdown-menu-item dropdown-item small py-2 text-secondary" href="{% url 'password_change' %}">
                    <i class="fa-solid fa-key me-2 text-warning"></i>Change Password
                </a>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
                <form action="{% url 'logout' %}" method="POST" class="px-3 py-1">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm btn-danger w-100 text-start small">
                        <i class="fa-solid fa-right-from-bracket me-2"></i>Log Out
                    </button>
                </form>
            </li>
        </ul>
    </div>
                    {% else %}
                        <a href="{% url 'login' %}" class="btn btn-sm btn-outline-light me-2 fw-semibold">Sign In</a>
                        <a href="{% url 'register' %}" class="btn btn-sm btn-light text-primary fw-bold">Register</a>
                        <a href="{% url 'password_change' %}" class="btn btn-sm btn-outline-light me-2">Change Password</a>
                    {% endif %}
                    
                </div>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
